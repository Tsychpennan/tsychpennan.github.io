<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Countdown</title>

    <!-- Importera Montserrat från Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style> 
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Montserrat", sans-serif;
            background: url("https://tsychpennan.github.io/background_counter.png") no-repeat center center fixed;
            background-size: cover;
            color: #754c76;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin: 0.8rem;
        }
        .timer {
            font-size: 10em;
            margin: 0.8rem;
            font-weight: 700; /* Gör siffrorna lite mer markerade */
        }
    </style>
</head>
<body>
    <div class="frosted-container">
        <h1>BILJETTERNA SLÄPPS OM:</h1>

        <div class="timer" id="countdown"></div>
        <img src="qr-code.png" alt="QR-kod" id="qrImage" style="margin: 2rem auto 0 auto; display: none; width: 500px; height: auto; border-radius: 20px; display: none;">
    </div>

    <script>
        // Sätt måldatum och tid (år, månad-1, dag, timme, minut, sekund)
        const targetDate = new Date(2026, 2, 18, 20, 0, 0).getTime();

        const countdown = document.getElementById("countdown");

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                countdown.textContent = "ANMÄL ER HÄR:";
                document.getElementById("qrImage").style.display = "block";
                document.querySelector(".frosted-container h1").style.display = "none";
                clearInterval(interval);
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdown.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        // Uppdatera varje sekund
        const interval = setInterval(updateCountdown, 1000);
        updateCountdown(); // kör direkt första gången
    </script>
</body>
</html>
